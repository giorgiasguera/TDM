#post optuna
data:
    src: "text"         # Source: Text to Pose
    trg: "skels"        # Target: 3D body coordinates (skeletons)
    files: "files"      # Filename for each sequence

    train: "./Data/phoenix14t/train"
    dev:   "./Data/phoenix14t/dev"
    test:  "./Data/phoenix14t/test"

    max_sent_length: 300    # Max sentence length (both src and trg), filtra samples più lunghi
    skip_frames: 1          # Skip frames in the data, to reduce the data input size (1 = nessuno)
    src_vocab: "./Configs/src_vocab.txt"   # Vocabolario testo libero (generato automaticamente se assente)

training:
    random_seed: 27         # Seed per riproducibilità
    optimizer: "adam"       # Adam optimiser
    learning_rate: 0.001    # Initial model learning rate 
    learning_rate_min: 2.0e-07 #lr emanuele
    weight_decay: 0.0001
    clip_grad_norm: 5.0     # Gradient clipping (norma massima)
    batch_size: 32          # Batch size VEDI QUA!!!! (Sign-IDD usa 64, PT usa 8 — 16 è un buon compromesso) 
    scheduling: "plateau"   # LR scheduling: "plateau" (ReduceLROnPlateau) or "cosine"
    patience: 7             # How many epochs of no improvement causes a LR reduction
    decrease_factor: 0.7   # LR reduction factor, after the # of patience epochs
    early_stopping_metric: "dtw" # Which metric determines scheduling: "dtw", "loss", "bt" (back-translation)
    epochs: 20000
    validation_freq: 1000     
    logging_freq: 250
    eval_metric: "dtw"      # Evaluation metric during training: "dtw" o "bt" (BLEU back-translation)
    model_dir: "./Models/Base" # Where the model shall be stored
    overwrite: False        # # Flag to overwrite a previous saved model in the model_dir
    continue: True          # # Flag to continue from a previous saved model in the model_dir
    shuffle: True           # Flag to shuffle the data during training (Mescola i dati ad ogni epoca) QUA!!
    use_cuda: True          # Flag to use GPU cuda capabilities
    max_output_length: 300  # Lunghezza massima sequenza generata durante inference (Max Output Length)
    keep_last_ckpts: 1      #  How many previous best/latest checkpoints to keep
    loss: "L1"              # Loss function (MSE, L1) (paper TDM usa L1 per L_joint)
    bone_loss: "MSE"        # Loss function (MSE, L1)(paper TDM usa MSE per L_bone)

model:
    initializer: "xavier"       # Inizializzazione pesi principali (xavier, uniform, normal, zeros)
    bias_initializer: "zeros"   # Inizializzazione bias
    embed_initializer: "xavier" # Inizializzazione embedding layer
    trg_size: 150               # Dimensione vettore pose per frame (50 joint × 3D = 150)

    # Data augmentation (opzionale, disabilitata di default)
    #just_count_in: False        # Augmentation: usa solo il counter come input decoder (PT)
    #gaussian_noise: TRUE       #QUA
    #noise_rate: 5               # Deviazione standard del rumore gaussiano (se abilitato)
    #future_prediction: 0        # Augmentation: predici N frame nel futuro (0 = disabilitato)

    encoder:                    # Text Encoder (corrisponde al Symbolic Encoder di PT, §3.6 paper TDM)
        type: "transformer"
        num_layers: 4          
        num_heads: 8           
        embeddings:
            embedding_dim: 1024    
            dropout: 0.0            # PROVA
            scale: False            # Scaling dell'embedding (√d, usato in alcuni Transformer) (text_encoder.py)
            #norm_type: "layer"      # (QUA!!) Normalizzazione embedding: "batch", "layer", "group"
            #num_groups: 32          # (QUA!!) Numero gruppi per GroupNorm (se norm_type="group")
        hidden_size: 1024 
        ff_size: 2048          
        dropout: 0.1            # PROVA 0.0

    diffusion:                  # Processo di Diffusione (§3.1-3.3 paper TDM)
        timesteps: 1000         # T = numero totale di timestep (paper TDM §3.6)
        sampling_timesteps: 5   #dopo prova 50
        scale: 1.0              # Scaling delle pose prima del forward diffusion (Sign-IDD)
        lambda_bone: 0.1        # 

        # Denoiser D (corrisponde all'ACD di Sign-IDD, semplificato per TDM)
        num_layers: 4           # Paper TDM §3.6: 4 layer (Sign-IDD usa 2)
        num_heads: 8            # Paper TDM §3.6: 8 heads
        hidden_size: 1024       # Paper TDM §3.6: 1024
        ff_size: 2048
        dropout: 0.1
        embeddings:
            embedding_dim: 1024     # prima era 1024
            dropout: 0.1          #PROVA